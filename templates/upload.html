<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>上传</title>
<style>
  body { max-width: 640px; margin: 60px auto; font-family: serif; color: #222; padding: 0 16px; }
  h1 { font-size: 1.4rem; margin-bottom: 32px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 4px; }
  input, textarea { width: 100%; box-sizing: border-box; font-family: inherit; font-size: 1rem; border: 1px solid #ddd; padding: 6px 8px; border-radius: 2px; color: #222; }
  input:focus, textarea:focus { outline: none; border-color: #aaa; }
  textarea { resize: vertical; }
  .row { display: flex; gap: 16px; }
  .row .field { flex: 1; }
  button { margin-top: 8px; font-family: inherit; font-size: 0.9rem; padding: 8px 20px; border: 1px solid #aaa; background: none; cursor: pointer; border-radius: 2px; }
  button:hover { background: #f5f5f5; }
  .msg { font-size: 0.85rem; color: #888; margin-top: 16px; }
  .back { font-size: 0.85rem; color: #888; text-decoration: none; display: inline-block; margin-bottom: 32px; }
  .back:hover { color: #333; }
</style>
</head>
<body>
<a class="back" href="/">← 返回</a>
<h1>上传</h1>
{% if msg %}<div class="msg">{{ msg }}</div>{% endif %}
<form method="post">
  <div class="field">
    <label>标题</label>
    <input name="title" value="{{ form.title or '' }}">
  </div>
  <div class="row">
    <div class="field">
      <label>作者</label>
      <input name="author" value="{{ form.author or '' }}">
    </div>
    <div class="field">
      <label>日期</label>
      <input name="upload_time" type="date" value="{{ form.upload_time or today }}">
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>系列</label>
      <input name="series" value="{{ form.series or '' }}">
    </div>
    <div class="field">
      <label>系列序号</label>
      <input name="series_index" type="number" value="{{ form.series_index or '' }}">
    </div>
  </div>
  <div class="field">
    <label>标签（逗号分隔）</label>
    <input name="tags" value="{{ form.tags or '' }}">
  </div>
  <div class="field">
    <label>链接</label>
    <input name="link" type="url" value="{{ form.link or '' }}">
  </div>
  <div class="field">
    <label>正文</label>
    <textarea name="content" rows="16">{{ form.content or '' }}</textarea>
  </div>
  <button type="submit">保存</button>
</form>
</body>
</html>
